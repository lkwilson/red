name: Build snapshot

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: cat7
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate image tag
        id: tag
        run: |
          TAG=$(git describe --tags --always)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Generated tag: $TAG"
      - name: Set up Docker Buildx
        run: |
          docker context create builders --docker "host=tcp://localhost:2375"
          docker buildx create --name mybuilder --use builders
      - name: Build and push (amd64)
        run: |
          REG='${{ secrets.DOCKER_REG_URL }}'
          NAME="${GITHUB_REPOSITORY##*/}"
          echo '${{ secrets.DOCKER_REG_PW }}' | docker login "$REG" -u '${{ secrets.DOCKER_REG_UN }}' --password-stdin
          docker buildx build --platform linux/amd64 \
            -t "$REG/library/${NAME}:${{ steps.tag.outputs.tag }}" \
            --push .
