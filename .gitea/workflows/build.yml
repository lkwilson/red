name: Build and push release image

on:
  push:
    tags: ['[0-9]*.[0-9]*.[0-9]*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: cat7
    env:
      SCCACHE_BUCKET: sccache
      SCCACHE_ENDPOINT: https://sccache-s3.endsy.me
      SCCACHE_REGION: us-east-1
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_KEY_PREFIX: red
      AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_S3_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        run: |
          docker context create builders --docker "host=tcp://localhost:2375"
          docker buildx create --name mybuilder --use builders
      - name: Build and push (amd64)
        run: |
          REG='${{ secrets.DOCKER_REG_URL }}'
          NAME="${GITHUB_REPOSITORY##*/}"
          TAG="${GITHUB_REF_NAME}"
          echo '${{ secrets.DOCKER_REG_PW }}' | docker login "$REG" -u '${{ secrets.DOCKER_REG_UN }}' --password-stdin
          docker buildx build --platform linux/amd64 \
            --build-arg SCCACHE_BUCKET="$SCCACHE_BUCKET" \
            --build-arg SCCACHE_ENDPOINT="$SCCACHE_ENDPOINT" \
            --build-arg SCCACHE_REGION="$SCCACHE_REGION" \
            --build-arg SCCACHE_S3_USE_SSL="$SCCACHE_S3_USE_SSL" \
            --build-arg SCCACHE_S3_KEY_PREFIX="$SCCACHE_S3_KEY_PREFIX" \
            --secret id=sccache_aws_access_key_id,env=AWS_ACCESS_KEY_ID \
            --secret id=sccache_aws_secret_access_key,env=AWS_SECRET_ACCESS_KEY \
            -t "$REG/library/${NAME}:${TAG}" \
            -t "$REG/library/${NAME}:latest" \
            --push .
